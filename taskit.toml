[workspace]
# root = "/path/to/workspace"  # defaults to Cargo.toml location
crates = [
  { dir = "crates/taskit-core", pkg = "taskit-core" },
  { dir = "crates/taskit-types", pkg = "taskit-types" },
  { dir = "crates/taskit-crux", pkg = "taskit-crux" },
  { dir = "crates/taskit-testing", pkg = "taskit-testing" },
  { dir = "crates/taskit-engine", pkg = "taskit-engine" },
  { dir = "crates/taskit-output", pkg = "taskit-output" },
  { dir = "crates/taskit-macros", pkg = "taskit-macros" },
  { dir = "crates/taskit-init", pkg = "taskit-init" },
  { dir = "", pkg = "taskit" },
]
# offline_skip = "test(/.*network.*/)"


[[workspace.propagation]]
source = "taskit-core"
dependents = ["taskit-crux", "taskit-crux", "taskit-engine", "taskit-engine", "taskit"]

[[workspace.propagation]]
source = "taskit-engine"
dependents = ["taskit"]

[[workspace.propagation]]
source = "taskit-init"
dependents = ["taskit"]

[[workspace.propagation]]
source = "taskit-macros"
dependents = ["taskit-engine", "taskit-init"]

[[workspace.propagation]]
source = "taskit-output"
dependents = ["taskit-engine", "taskit"]

[[workspace.propagation]]
source = "taskit-testing"
dependents = ["taskit-crux", "taskit-engine", "taskit-output", "taskit-macros", "taskit-init"]

[[workspace.propagation]]
source = "taskit-types"
dependents = ["taskit-core", "taskit-crux", "taskit-testing", "taskit-engine", "taskit-output", "taskit-macros", "taskit-init", "taskit"]

[protocol]
# lockfile = "taskit-protocol.lock"

[[protocol.surfaces]]
name = "taskit-core-conflict_resolver"
path = "crates/taskit-core/src/conflict_resolver.rs"

[[protocol.surfaces]]
name = "taskit-core-pipeline_runner"
path = "crates/taskit-core/src/pipeline_runner.rs"

[[protocol.surfaces]]
name = "taskit-types-error"
path = "crates/taskit-types/src/error.rs"

[[protocol.surfaces]]
name = "taskit-engine-command"
path = "crates/taskit-engine/src/command.rs"

[[protocol.surfaces]]
name = "taskit-engine-discovery"
path = "crates/taskit-engine/src/discovery.rs"

[[protocol.surfaces]]
name = "taskit-output-sink"
path = "crates/taskit-output/src/sink.rs"

[[protocol.surfaces]]
name = "taskit-output-formatter"
path = "crates/taskit-output/src/formatter.rs"

[[protocol.surfaces]]
name = "taskit-init-plan"
path = "crates/taskit-init/src/plan.rs"

# Coverage enforcement: run `taskit coverage` to check.
#
# [coverage]
# crate_name = "my-crate"
# threshold = 80.0

[ci]
# cruxfile  = "Cruxfile"  # path to Cruxfile for crux-based pipelines
# fail_fast = false        # stop on first failing step

[[ci.steps]]
name = "self-check"
cmd = "self-check"
gate = true

[[ci.steps]]
name = "fmt --check"
cmd = "fmt --check"
gate = false

[[ci.steps]]
name = "lint"
cmd = "lint"
gate = false

[[ci.steps]]
name = "compile-tests"
cmd = "compile-tests"
gate = false

[[ci.steps]]
name = "test"
cmd = "test"
gate = false

[[ci.steps]]
name = "check-deps"
cmd = "check-deps"
gate = false

[[ci.steps]]
name = "check-protocol-drift"
cmd = "check-protocol-drift"
gate = false

# Metric thresholds for `taskit inspect`. CLI flags override these.
#
# [inspect]
# max_clippy_warnings = 0
# max_clippy_errors   = 0
# max_test_failures   = 0
# max_todo_fixme      = 20   # omit to skip the TODO/FIXME check

# Default retention policy for `taskit clean`. CLI --older-than overrides.
#
# [clean]
# older_than = "7d"  # use `cargo sweep`; omit to run `cargo clean`

# Git flow: main -> develop (work) -> staging (integration) -> release (publish) -> main
# These are the defaults; uncomment to customize branch names.
#
# [flow]
# main = "main"
# develop = "develop"
# staging = "staging"
# release = "release"

[release]
github_repo = "89jobrien/taskit"
publish_order = [
  "taskit-types",
  "taskit-core",
  "taskit-testing",
  "taskit-crux",
  "taskit-macros",
  "taskit-output",
  "taskit-init",
  "taskit-engine",
  "taskit",
]
# skip_docs   = false  # skip `cargo doc` before publishing
# allow_dirty = false  # publish with uncommitted changes
