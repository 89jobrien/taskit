name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What workflow is painful today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should taskit solve this? Include CLI examples if applicable.
      placeholder: |
        taskit <new-command> [--flag]

        Expected behavior:
        ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they are less ideal.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area of taskit does this affect?
      options:
        - CLI / subcommands
        - Configuration (taskit.toml)
        - Pipeline engine
        - Output / formatters
        - Affected-crate detection
        - Protocol drift
        - Init / discovery
        - CI integration
        - Other
    validations:
      required: true
